<!DOCTYPE html>
<!-- DOCTYPE tells the browser this is a modern HTML5 page. -->
<!-- Always the very first line — never put anything above it. -->

<html lang="en">
<!-- <html> wraps the entire page. -->
<!-- lang="en" tells browsers and screen readers the page is in English. -->

<!-- ============================================================
     HEAD — invisible setup section.
     Nothing in here appears on screen. It links our CSS file,
     sets the page title, and configures the mobile viewport.
     ============================================================ -->
<head>

  <!-- UTF-8 lets the browser display any character correctly:
       degree symbols (°), accented letters, emoji, etc. -->
  <meta charset="UTF-8" />

  <!-- Makes the page fit the screen width on phones.
       Without this, mobile browsers zoom out and everything
       looks tiny. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Text shown on the browser tab at the top of the window. -->
  <title>Weather Dashboard</title>

  <!-- Links our CSS file. "href" is the path to the file.
       style.css is in the same folder as index.html, so we
       just write its filename directly — no subfolder needed. -->
  <link rel="stylesheet" href="css/style.css" />

</head>

<!-- ============================================================
     BODY — everything the user actually sees on screen.
     We divide the page into three logical sections:
       1. <header>  — search bar at the top
       2. <main>    — current weather + forecast + chart
       3. <scripts> — JavaScript files loaded at the very bottom
     ============================================================ -->
<body>

  <!-- ==========================================================
       HEADER — Search Bar
       The <header> tag marks the top section of the page.
       It contains only the search input and button.
       Member 5 will connect these to the Geocoding API in app.js.
       ========================================================== -->
  <header>

    <!-- This div groups the input and button together so CSS
         can lay them out side by side using flexbox. -->
    <div id="search-container">

      <!-- The text field where the user types a city name.
           id="search-input" → JavaScript reads the typed value from here.
           placeholder=      → grey hint text shown when the field is empty.
           type="text"       → standard single-line text input. -->
      <input
        type="text"
        id="search-input"
        placeholder="Search city..."
      />

      <!-- The button that triggers the city search when clicked.
           id="search-btn" → app.js listens for a click on this element.
           The text "Search" is what the user sees on the button. -->
      <button id="search-btn">Search</button>

    </div>
    <!-- End #search-container -->

    <!-- Search results appear here after a city is searched.
         JavaScript (app.js) will inject clickable city buttons
         into this div. It starts empty on purpose. -->
    <div id="search-results"></div>

    <!-- Loading message shown while locating the user or fetching data.
         Starts hidden (display:none). JavaScript shows and hides it.
         e.g. "Locating you..." or "Loading weather..." -->
    <p id="loading" style="display:none; color:#aaa; text-align:center; font-style:italic;"></p>

    <!-- Error message shown when geolocation fails or city is not found.
         Starts hidden (display:none). JavaScript shows it when needed.
         e.g. "Location access denied. Please search for a city." -->
    <p id="error-msg" style="display:none; color:#f5a742; text-align:center;"></p>

  </header>
  <!-- End header -->


  <!-- ==========================================================
       MAIN — All visible weather content lives here.
       <main> is a semantic HTML tag that tells browsers and
       screen readers: "this is the primary content of the page."
       ========================================================== -->
  <main>

    <!-- --------------------------------------------------------
         CURRENT WEATHER CARD
         class="weather-card" → style.css will style this with
         a semi-transparent background and rounded corners.
         Member 3 will write display.js to fill in the -- values
         with real data from the API.
         -------------------------------------------------------- -->
    <section class="weather-card" id="current-weather">

      <!-- City name: starts as "--" and gets replaced by JS.
           e.g. after loading: "Paris" -->
      <h1 id="city-name">--</h1>

      <!-- Weather condition description + emoji.
           e.g. after loading: "Clear sky ☀️"
           Member 3 builds the weatherDescriptions lookup for this. -->
      <p id="condition">--</p>

      <!-- Current temperature. Starts with placeholder unit label.
           e.g. after loading: "21°C" or "70°F" after unit toggle. -->
      <p id="temperature">--°C</p>

      <!-- Current wind speed. Keeps the "Wind:" label visible always
           so the layout does not jump when data loads.
           e.g. after loading: "Wind: 13 km/h" -->
      <p id="wind-speed">Wind: -- km/h</p>

      <!-- Unit toggle button. Clicking it switches all temperatures
           between Celsius and Fahrenheit without re-fetching data.
           Member 1 and Member 3 connect this in app.js. -->
      <button id="unit-toggle">Switch to °F</button>

      <!-- Status message shown while loading or on errors.
           e.g. "Locating you...", "Loading...", "City not found."
           Starts empty — JS makes it appear only when needed. -->
      <p id="status-message"></p>

    </section>
    <!-- End #current-weather -->


    <!-- --------------------------------------------------------
         7-DAY FORECAST SECTION
         Member 4 will build renderForecast() in display.js.
         It loops through 7 days and injects .forecast-card divs
         into #forecast-container dynamically.
         -------------------------------------------------------- -->
    <section id="forecast-section">

      <!-- Section heading — always visible so the layout is clear
           even before the data arrives. -->
      <h2>7-Day Forecast</h2>

      <!-- Empty container. JavaScript fills this with 7 cards,
           one for each day. Each card will show:
           day name, weather emoji, high temp, low temp. -->
      <div id="forecast-container"></div>

    </section>
    <!-- End #forecast-section -->


    <!-- --------------------------------------------------------
         HOURLY CHART SECTION
         Member 4 will build renderChart() in display.js.
         It injects CSS bar chart divs into #chart-container.
         Each bar represents one time slot of the current day.
         -------------------------------------------------------- -->
    <section id="chart-section">

      <!-- Section heading — visible straight away. -->
      <h2>Today Hourly</h2>

      <!-- Empty container. JavaScript will inject bar divs here.
           Each bar's height is proportional to the temperature,
           with a time label below and a temp label above. -->
      <div id="chart-container"></div>

    </section>
    <!-- End #chart-section -->

  </main>
  <!-- End main -->


  <!-- ==========================================================
       JAVASCRIPT FILES — loaded at the bottom of <body>.

       WHY AT THE BOTTOM?
       HTML loads top to bottom. If scripts were in <head>, they
       would run before the HTML elements exist, and JavaScript
       would fail to find things like #city-name or #forecast-container.
       Loading at the bottom guarantees all HTML is ready first.

       WHY THIS ORDER?
       Each file depends on the one before it:
         weather-codes.js  defines weatherDescriptions (used by display.js)
         api.js            defines fetchWeather, fetchGeocode (used by app.js)
         display.js        defines renderCurrent, renderForecast (used by app.js)
         app.js            runs last; it calls everything above to start the app
       ========================================================== -->

  <!-- Step 1: Load the WMO weather code to emoji/description lookup table. -->
  <script src="js/weather-codes.js"></script>

  <!-- Step 2: Load all API fetch functions (fetchWeather, fetchGeocode). -->
  <script src="js/api.js"></script>

  <!-- Step 3: Load all DOM update functions (renderCurrent, renderForecast, renderChart). -->
  <script src="js/display.js"></script>

  <!-- Step 4: Load the app entry point last — it kicks everything off. -->
  <script src="js/app.js"></script>

  <!-- ==========================================================
       FOOTER — Credit line at the very bottom of the page.
       The <footer> tag is a semantic HTML element that tells
       browsers and screen readers this is the bottom section.
       It contains a simple credit line for the data source
       and the team who built the project.
       ========================================================== -->
  <footer>

    <!-- Credit text — visible at the bottom of every page load.
         · is a Unicode middle dot used as a separator between credits. -->
    <p>Weather data by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> &nbsp;·&nbsp; Built by Group 4</p>

  </footer>
  <!-- End footer -->

</body>
</html>
